<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Life Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>

    <!-- Top bar: theme toggle -->
    <header class="topbar">
      <span class="topbar-title">Dashboard</span>
      <button id="theme-toggle" type="button" class="theme-toggle-btn" aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
        <span class="theme-label">Dark Mode</span>
      </button>
    </header>

    <main class="dashboard">

      <!-- Greeting Widget -->
      <section id="greeting-widget" class="widget" aria-label="Greeting">
        <p id="greeting-message" class="greeting-message"></p>
        <time id="greeting-time" class="greeting-time" datetime=""></time>
        <p id="greeting-date" class="greeting-date"></p>
      </section>

      <!-- Focus Timer Widget -->
      <section id="focus-timer" class="widget" aria-label="Focus Timer">
        <div class="widget-header">
          <h2 class="widget-title">Focus Timer</h2>
        </div>
        <div id="timer-display" class="timer-display" role="timer" aria-live="polite">25:00</div>
        <div class="timer-controls">
          <button id="timer-start" type="button">Start</button>
          <button id="timer-stop" type="button">Stop</button>
          <button id="timer-reset" type="button">Reset</button>
        </div>
        <!-- Change duration control -->
        <div class="timer-duration-control">
          <label for="timer-duration-input" class="duration-label">Duration (min):</label>
          <input
            id="timer-duration-input"
            type="number"
            min="1"
            max="120"
            value="25"
            class="duration-input"
            aria-label="Set timer duration in minutes"
          />
          <button id="timer-set-duration" type="button" class="btn-secondary">Set</button>
        </div>
        <p id="timer-duration-error" class="error-message" role="alert" aria-live="polite"></p>
      </section>

      <!-- Task Manager Widget -->
      <section id="task-manager" class="widget" aria-label="Task Manager">
        <div class="widget-header">
          <h2 class="widget-title">Tasks</h2>
          <div class="task-sort-controls">
            <label for="task-sort" class="sort-label">Sort:</label>
            <select id="task-sort" class="sort-select" aria-label="Sort tasks">
              <option value="default">Default</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
              <option value="active">Active first</option>
              <option value="done">Completed first</option>
            </select>
          </div>
        </div>
        <form id="task-form" novalidate>
          <input
            id="task-input"
            type="text"
            maxlength="500"
            placeholder="Add a new task…"
            aria-label="New task description"
          />
          <button type="submit">Add</button>
          <p id="task-input-error" class="error-message" role="alert" aria-live="polite"></p>
        </form>
        <ul id="task-list" class="task-list" aria-label="Task list"></ul>

        <!-- Template for a single task row -->
        <template id="task-template">
          <li class="task-item">
            <input type="checkbox" class="task-checkbox" aria-label="Mark task complete" />
            <span class="task-text"></span>
            <button type="button" class="task-edit-btn" aria-label="Edit task">Edit</button>
            <button type="button" class="task-delete-btn" aria-label="Delete task">Delete</button>
          </li>
        </template>

        <p id="task-storage-error" class="error-message" role="alert" aria-live="polite"></p>
      </section>

      <!-- Quick Links Widget -->
      <section id="quick-links" class="widget" aria-label="Quick Links">
        <h2 class="widget-title">Quick Links</h2>
        <form id="link-form" novalidate>
          <input
            id="link-label-input"
            type="text"
            maxlength="100"
            placeholder="Label"
            aria-label="Link label"
          />
          <p id="link-label-error" class="error-message" role="alert" aria-live="polite"></p>
          <input
            id="link-url-input"
            type="url"
            maxlength="2048"
            placeholder="https://example.com"
            aria-label="Link URL"
          />
          <p id="link-url-error" class="error-message" role="alert" aria-live="polite"></p>
          <button type="submit">Add Link</button>
        </form>
        <div id="link-list" class="link-list" aria-label="Saved links"></div>

        <!-- Template for a single link entry -->
        <template id="link-template">
          <div class="link-item">
            <a class="link-btn" target="_blank" rel="noopener noreferrer"></a>
            <button type="button" class="link-delete-btn" aria-label="Delete link">Delete</button>
          </div>
        </template>

        <p id="link-storage-error" class="error-message" role="alert" aria-live="polite"></p>
      </section>

    </main>

    <script src="js/app.js"></script>
  </body>
</html>
